services:
  - type: web
    name: oms-label-service
    env: python
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ORDERS_SERVICE_URL
        sync: false
      - key: LABEL_STORAGE_BUCKET
        value: oms-labels
